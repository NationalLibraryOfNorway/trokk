[package]
name = "trokk"
version = "0.0.0"
description = "A Tauri App"
authors = ["Team Tekst"]
license = ""
repository = ""
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[build-dependencies]
tauri-build = { version = "1.5", features = [] }

[dependencies]
tauri = { version = "1.6.1", features = ["window-show", "fs-exists", "dialog-open", "fs-write-file", "system-tray", "fs-read-dir", "window-close", "window-create", "http-all", "protocol-asset", "path-all", "shell-open"] }
tauri-plugin-store = { git = "https://github.com/tauri-apps/plugins-workspace", branch = "v1" }
tauri-plugin-fs-watch = { git = "https://github.com/tauri-apps/plugins-workspace", branch = "v1" }
tauri-plugin-oauth = "0.0.0-alpha.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
gethostname = "0.4.3"
url = "2.5.0"
reqwest = "0.11.27"
once_cell = "1.19.0"
image = "0.25.1"
webp = "0.2.7"
thiserror = "1.0.58"
rayon = "1.10.0"
tokio = { version = "1.37.0", features = ["full"] }

[dev-dependencies]
tempfile = "3.10.1"

[features]
# this feature is used for production builds or when `devPath` points to the filesystem
# DO NOT REMOVE!!
custom-protocol = ["tauri/custom-protocol"]
